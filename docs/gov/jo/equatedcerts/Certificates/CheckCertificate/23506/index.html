<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شهادة معادلة</title>

<style>
body {
    font-family: "Tahoma", Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 0;
}

.container {
    width: 700px;
    margin: 50px auto;
    background: #fff;
    border: 1px solid #ccc;
    padding: 30px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h2 {
    margin: 0;
    color: #1f4e79;
}

.table {
    width: 100%;
    border-collapse: collapse;
}

.table td {
    border: 1px solid #ccc;
    padding: 10px;
    font-size: 15px;
}

.label {
    background: #f0f0f0;
    font-weight: bold;
    width: 35%;
}

.value {
    width: 65%;
}

.footer {
    margin-top: 20px;
    text-align: center;
    color: #555;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h2>وزارة التربية والتعليم</h2>
        <p>شهادة معادلة</p>
    </div>

    <table class="table">
        <tr>
            <td class="label">اسم الطالب</td>
            <td class="value">محمد أحمد</td>
        </tr>
        <tr>
            <td class="label">رقم الجلوس</td>
            <td class="value">12041</td>
        </tr>
        <tr>
            <td class="label">التخصص</td>
            <td class="value">علمي</td>
        </tr>
        <tr>
            <td class="label">المعدل</td>
            <td class="value">85%</td>
        </tr>
        <tr>
            <td class="label">سنة التخرج</td>
            <td class="value">2024</td>
        </tr>
    </table>

    <div class="footer">
        هذه الصفحة لأغراض العرض فقط
    </div>

</div>

</body>
</html>
