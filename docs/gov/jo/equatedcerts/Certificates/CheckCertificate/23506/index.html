<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>الشهادات الأجنبية</title>

    <!-- ✅ Fonts -->
    <style>
        @font-face {
            font-family: 'Droid-Arabic-Kufi';
            src: url('../fonts/Droid-Arabic-Kufi.ttf.woff') format('woff'),
                 url('../fonts/Droid-Arabic-Kufi.ttf.svg#Droid-Arabic-Kufi') format('svg'),
                 url('../fonts/Droid-Arabic-Kufi.ttf.eot'),
                 url('../fonts/Droid-Arabic-Kufi.ttf.eot?#iefix') format('embedded-opentype');
        }

        @font-face {
            font-family: 'Droid-Arabic-Naskh';
            src: url('../fonts/Droid-Arabic-Naskh.ttf.woff') format('woff'),
                 url('../fonts/Droid-Arabic-Naskh.ttf.svg#Droid-Arabic-Naskh') format('svg'),
                 url('../fonts/Droid-Arabic-Naskh.ttf.eot'),
                 url('../fonts/Droid-Arabic-Naskh.ttf.eot?#iefix') format('embedded-opentype');
        }

        @font-face {
            font-family: 'Calibri';
            src: url('../fonts/Calibri.ttf.woff') format('woff'),
                 url('../fonts/Calibri.ttf.svg#Calibri') format('svg'),
                 url('../fonts/Calibri.ttf.eot'),
                 url('../fonts/Calibri.ttf.eot?#iefix') format('embedded-opentype');
        }

        /* ✅ Apply fonts */
        body {
            font-family: 'Droid-Arabic-Naskh', Arial, sans-serif;
        }

        span, div {
            font-family: 'Droid-Arabic-Naskh', serif;
        }

        /* ✅ Target: وزير التربية والتعليم */
        .my-marginForegin2 {
            font-family: 'Droid-Arabic-Kufi' !important;
        }

        /* ✅ Numbers */
        .rightSerialNumdivForeign,
        .rightDatedivForeign,
        .rightHijriDatedivForeign {
            font-family: 'Calibri', sans-serif;
        }
    </style>

    <!-- your original CSS -->
    <link href="/equatedcerts/css/Certificates.css" rel="stylesheet" type="text/css">
</head>

<body>

<div class="imagediv">
    <canvas id="qr-code"></canvas>
</div>

<div class="rightSerialNumdivForeign">
    <div style="float:right;font-size:24px">202206221012041</div>
</div>

<div class="rightDatedivForeign">
    <div style="float:right;font-size:24px">1443/11/23</div>
</div>

<div class="rightHijriDatedivForeign">
    <div style="float:right;font-size:24px">2022/06/22</div>
</div>

<div class="cleardiv">
    <div class="center cleardiv">
        <div style="text-align: right" class="my-marginForegin">

            <!-- (content unchanged) -->

            <div>
                <!-- ✅ THIS IS NOW KUF I FONT -->
                <span class="my-marginForegin2"> وزير التربية والتعليم </span>
                <br /><br />
            </div>

        </div>
    </div>
</div>

<script src="/equatedcerts/js/qrious.min.js"></script>

<script>
var qr;
(function () {
    qr = new QRious({
        element: document.getElementById('qr-code'),
    });

    var qrtext = "https://certs.moe.gov.jo/equatedcerts/Certificates/CheckCertificate/" + 12041;

    qr.set({
        foreground: 'black',
        size: 100,
        value: qrtext
    });
})();
</script>

</body>
</html>
